<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Death_dreamy Mods</title>
</head>
<body>
    <div class="main-panel">
        <div class="hero">
            <h1 class="rgb-text">Death_dreamy Mods</h1>
            <p class="subtitle">Make your game better</p>
            
            <div class="mod-grid">
                <!-- Button 1: Particles -->
                <div class="mod-card">
                    <h3>PARTICLES MOD</h3>
                    <a href="Particles_Mod.user.js" class="btn neon-pink">INSTALL</a>
                </div>

                <!-- Button 2: Shaders -->
                <div class="mod-card">
                    <h3>SHADERS & VISUALS</h3>
                    <a href="Shaders+Visuals_MOD.user.js" class="btn neon-blue">INSTALL</a>
                </div>

                <!-- Button 3: KeyStroke -->
                <div class="mod-card">
                    <h3>KEYSTROKE MOD</h3>
                    <a href="KeyStrokeMod.user.js" class="btn neon-blue">INSTALL</a>
                </div>

                <!-- Button 4: HUD -->
                <div class="mod-card">
                    <h3>HUD MOD</h3>
                    <a href="HUD_Mod.user.js" class="btn neon-pink">INSTALL</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
